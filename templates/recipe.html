<!DOCTYPE html>
<html>
<head>
    <title>Rezept</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/bootstrap.min.css') }}">
</head>

<body class="bg-light">

<div class="container mt-4">

    <h2 class="mb-4">Rezeptverwaltung</h2>

    <!-- JSON Laden -->
    <div class="card mb-4">
        <div class="card-header">JSON Rezept laden</div>
        <div class="card-body">
            <form method="POST" action="/load_json" enctype="multipart/form-data">
                <input type="file" name="json_file" class="form-control mb-3" required>
                <button type="submit" class="btn btn-primary">JSON laden</button>
            </form>
        </div>
    </div>

    <!-- Maischprofil -->
    <div class="card mb-4">
        <div class="card-header">Maischprofil</div>
        <div class="card-body">

            <!-- EIN einziges Formular -->
            <form method="POST" action="/start_preheat">

                <table class="table table-bordered">
                    <thead>
                        <tr>
                            <th>Temp (°C)</th>
                            <th>Zeit (Min)</th>
                            <th></th>
                        </tr>
                    </thead>

                    <tbody id="mashTable">
                        {% if profile %}
                            {% for step in profile %}
                            <tr>
                                <td>
                                    <input type="number" step="0.1"
                                           name="temp[]"
                                           value="{{ step.temp }}"
                                           class="form-control"
                                           required>
                                </td>
                                <td>
                                    <input type="number"
                                           name="time[]"
                                           value="{{ step.time }}"
                                           class="form-control"
                                           required>
                                </td>
                                <td>
                                    <button type="button"
                                            class="btn btn-danger btn-sm"
                                            onclick="removeRow(this)">X</button>
                                </td>
                            </tr>
                            {% endfor %}
                        {% else %}
                            <tr>
                                <td><input type="number" step="0.1" name="temp[]" class="form-control" required></td>
                                <td><input type="number" name="time[]" class="form-control" required></td>
                                <td><button type="button" class="btn btn-danger btn-sm" onclick="removeRow(this)">X</button></td>
                            </tr>
                        {% endif %}
                    </tbody>
                </table>

                <!-- Rast hinzufügen -->
                <button type="button"
                        class="btn btn-secondary"
                        onclick="addRow()">
                    ➕ Rast hinzufügen
                </button>

                <!-- EINZIGER Vorheizen-Button -->
                <div class="mt-4">
                    <button type="submit"
                            class="btn btn-primary btn-lg">
                        🔥 Vorheizen starten
                    </button>
                </div>

            </form>

        </div>
    </div>

</div>

<script>
function addRow() {
    const table = document.getElementById("mashTable");
    const row = table.insertRow();
    row.innerHTML = `
        <td><input type="number" step="0.1" name="temp[]" class="form-control" required></td>
        <td><input type="number" name="time[]" class="form-control" required></td>
        <td><button type="button" class="btn btn-danger btn-sm" onclick="removeRow(this)">X</button></td>
    `;
}

function removeRow(btn) {
    btn.closest("tr").remove();
}
</script>

</body>
</html>
